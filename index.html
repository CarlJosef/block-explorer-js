<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Explorer</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Ethereum Block Explorer</h1>

      <section class="card">
        <h2>Check balance</h2>
        <input
          id="addressInput"
          type="text"
          placeholder="Enter wallet address"
        />
        <button id="getBalanceButton" type="button">Get balance</button>
        <p id="balanceResult">Balance: -</p>
      </section>

      <section class="card">
        <h2>Send transaction</h2>
        <input id="toInput" type="text" placeholder="To address" />
        <input id="privateKeyInput" type="password" placeholder="Private key" />
        <input id="amountInput" type="text" placeholder="Amount in ETH" />
        <button id="sendTransactionButton" type="button">
          Send transaction
        </button>
        <p id="transactionResult">Transaction: -</p>
      </section>

      <section class="card">
        <h2>Blockchain info</h2>
        <button id="getBlockCountButton" type="button">Get block count</button>
        <p id="blockCountResult">Blocks: -</p>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="statusMessage">Ready</p>
      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
